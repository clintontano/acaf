<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ACAF</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="admin-page admin-login-page">

    <div class="admin-login-box">
        <div class="admin-login-logo">
            <img src="assets/images/ACAF_logo.png" alt="ACAF Logo">
            <h1>ACAF Admin</h1>
            <p>Monitoring Dashboard</p>
        </div>

        <div class="admin-login-error" id="loginError">
            <i class="fas fa-exclamation-circle"></i>
            <span id="loginErrorMsg">Invalid username or password.</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-control" id="username" autocomplete="username" required placeholder="Enter your username">
            </div>
            <div class="form-group" style="margin-bottom:1.75rem;">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" autocomplete="current-password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="loginBtn">
                Sign In
            </button>
        </form>

        <div style="text-align:center;margin-top:1.5rem;">
            <a href="index.html" style="font-size:0.8rem;color:var(--color-text-light);"><i class="fas fa-arrow-left" style="margin-right:0.35rem;"></i>Back to Website</a>
        </div>
    </div>

    <script src="assets/js/acaf-data.js"></script>
    <script>
        // Redirect if already logged in
        if (ACAF.isLoggedIn()) {
            window.location.href = 'admin-dashboard.html';
        }

        ACAF.initialize();

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            btn.textContent = 'Signing in...';
            btn.disabled = true;
            errorEl.classList.remove('visible');

            // Small delay for UX
            setTimeout(() => {
                if (ACAF.login(username, password)) {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorEl.classList.add('visible');
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 400);
        }
    </script>

</body>
</html>
