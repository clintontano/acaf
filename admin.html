<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ACAF</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-login-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .admin-login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .admin-login-header img {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--color-text-dark);
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .login-btn:hover {
            background: var(--color-primary-dark);
        }
        .back-to-site {
            text-align: center;
            margin-top: 30px;
        }
        .back-to-site a {
            color: var(--color-text-light);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .back-to-site a:hover {
            color: var(--color-primary);
        }
        .error-message {
            background: #fee;
            color: #c53030;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;">

    <div class="admin-login-container">
        <div class="admin-login-header">
            <img src="assets/images/ACAF_logo.png" alt="ACAF Logo">
            <h2 style="color: white; margin: 0;">Admin Login</h2>
            <p style="color: rgba(255,255,255,0.8); margin: 10px 0 30px 0;">Africa Coalition for Academic Freedom</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <div class="error-message" id="errorMessage">
                Invalid username or password. Please try again.
            </div>

            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>

        <div class="back-to-site">
            <a href="index.html">← Back to Main Website</a>
        </div>
    </div>

    <script>
        // Simple login simulation (in production, this would connect to a backend)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // Simple validation (in production, this would be server-side)
            if (username === 'admin' && password === 'acaf2024') {
                // Store login session
                sessionStorage.setItem('acaf_admin_logged_in', 'true');
                sessionStorage.setItem('acaf_admin_username', username);
                
                // Redirect to dashboard
                window.location.href = 'admin-dashboard.html';
            } else {
                // Show error message
                errorMessage.style.display = 'block';
                
                // Clear password field
                document.getElementById('password').value = '';
            }
        });

        // Check if already logged in
        window.addEventListener('load', function() {
            if (sessionStorage.getItem('acaf_admin_logged_in') === 'true') {
                window.location.href = 'admin-dashboard.html';
            }
        });
    </script>
</body>

</html>
